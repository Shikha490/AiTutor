<!DOCTYPE html>
<html>

<head>
  <title>AI Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app-container">

  <!-- Sidebar -->

  <div class="sidebar">

    <h2>AI Planner</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="planner.html">AI Planner</a>
    <a href="subjects.html">Subjects</a>
    <a href="progress.html">Progress</a>
    <a href="profile.html">Profile</a>
    <a href="settings.html">Settings</a>

  </div>

  <!-- Main Content -->

  <div class="main-content">

    <h1>Create Study Plan</h1>

    <div class="card">

      <h3>Select Goal Type</h3>

      <select id="goalType">
        <option>Finish Syllabus</option>
        <option>Prepare for Exam</option>
        <option>Revision Plan</option>
      </select>

      <h3>Enter Target Days</h3>

      <input type="number"
             id="days"
             placeholder="Enter number of days">

      <h3>Subjects</h3>

      <input type="text"
             id="subjects"
             placeholder="Example: Math, Physics">

      <br><br>

      <button onclick="generatePlan()">
        Generate Plan
      </button>

    </div>

    <div class="card">

      <h3>Generated Plan</h3>

      <div id="output"></div>

    </div>

  </div>

</div>

<script src="js/script.js"></script>

</body>

</html>
